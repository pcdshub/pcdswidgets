{% set package_name = "pcdswidgets" %}
{% set import_name = "pcdswidgets" %}
{% set version = load_file_regex(load_file=os.path.join(import_name, "_version.py"), regex_pattern=".*version = '(\S+)'").group(1) %}

package:
  name: {{ package_name }}
  version: {{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
  - python >=3.9
  - setuptools_scm
  - pip
  - jinja2 >=3
  - qtpy
  - pyqt >=5
  run:
  - python >=3.9
  - pydm >=1.9.0
  - qtpy
  - pyqt >=5

test:
  imports:
  - pcdswidgets
  requires:
  - jinja2 >=3
  - pytest
  - pytest-qt
  - pytest-timeout
  - tomlkit >=0.14.0

about:
  home: https://github.com/pcdshub/pcdswidgets
  license: SLAC Open License
  summary: LCLS PyDM Widget Library
